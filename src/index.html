<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TimeLink Player</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--bg2:#0A0A12;--bg3:#0F0F1C;
  --purple:#7C3AED;--purple2:#A855F7;
  --mint:#00E5A0;--mint2:#00FFC4;
  --rose:#FF4D6D;--gold:#F59E0B;
  --t1:#F8FAFC;--t2:#94A3B8;--t3:#475569;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.12);
  --gp:rgba(124,58,237,.35);--gm:rgba(0,229,160,.25);
}
body{
  background:var(--bg);color:var(--t1);
  font-family:'DM Sans',sans-serif;
  height:100vh;display:flex;flex-direction:column;
  overflow:hidden;position:relative;
}
body::before{
  content:'';position:fixed;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(124,58,237,.08),transparent 70%);
  top:-100px;left:-100px;pointer-events:none;z-index:0;
  animation:bgP 8s ease-in-out infinite alternate;
}
body::after{
  content:'';position:fixed;
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(0,229,160,.06),transparent 70%);
  bottom:-80px;right:-80px;pointer-events:none;z-index:0;
  animation:bgP 10s ease-in-out infinite alternate-reverse;
}
@keyframes bgP{0%{opacity:.5;transform:scale(1)}100%{opacity:1;transform:scale(1.2)}}

/* 타이틀바 */
.titlebar{
  height:40px;-webkit-app-region:drag;
  display:flex;align-items:center;padding:0 16px;gap:10px;
  background:rgba(5,5,8,.9);border-bottom:1px solid var(--bd);
  flex-shrink:0;position:relative;z-index:10;
}
.tb-logo{
  width:24px;height:24px;border-radius:6px;
  background:linear-gradient(135deg,var(--purple),var(--mint));
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:9px;font-weight:900;color:#fff;
  box-shadow:0 0 12px var(--gp);
}
.tb-name{
  font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  letter-spacing:.15em;
  background:linear-gradient(135deg,var(--t1),var(--t2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.tb-ver{font-size:9px;color:var(--t3);font-family:'Orbitron',monospace;margin-left:auto}

/* 로그인 */
#loginScreen{
  flex:1;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px;position:relative;z-index:1;
}
#loginScreen.show{display:flex}
.li-icon{
  width:80px;height:80px;border-radius:22px;
  background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(0,229,160,.1));
  border:1px solid rgba(124,58,237,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;margin-bottom:20px;
  box-shadow:0 0 40px var(--gp),inset 0 1px 0 rgba(255,255,255,.1);
  animation:flt 4s ease-in-out infinite;
}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.li-title{
  font-family:'Orbitron',monospace;font-size:22px;font-weight:900;
  letter-spacing:.05em;
  background:linear-gradient(135deg,#fff 40%,var(--purple2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.li-sub{font-size:12px;color:var(--t3);text-align:center;margin-bottom:28px;line-height:1.7}
.fw{width:100%;max-width:280px;margin-bottom:10px;position:relative}
.fi{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.4}
.inp{
  width:100%;padding:11px 14px 11px 36px;border-radius:10px;
  border:1px solid var(--bd2);background:rgba(255,255,255,.03);
  color:var(--t1);font-size:13px;font-family:'DM Sans',sans-serif;
  outline:none;transition:all .25s;
}
.inp:focus{border-color:var(--purple2);background:rgba(124,58,237,.06);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.inp::placeholder{color:var(--t3)}
.li-btn{
  width:100%;max-width:280px;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .25s;margin-top:4px;
  box-shadow:0 4px 20px var(--gp);letter-spacing:.02em;
}
.li-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--gp)}
.li-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.li-st{font-size:11px;margin-top:10px;text-align:center;color:var(--t3);min-height:18px}
.li-st.error{color:var(--rose)}
.li-st.ok{color:var(--mint)}

/* 플레이어 */
#playerScreen{
  flex:1;display:none;flex-direction:column;
  overflow:hidden;position:relative;z-index:1;
}
#playerScreen.show{display:flex}

/* 유저 바 */
.user-bar{
  display:flex;align-items:center;padding:8px 14px;gap:8px;
  background:rgba(5,5,8,.8);border-bottom:1px solid var(--bd);
  flex-shrink:0;backdrop-filter:blur(20px);
}
.ue{font-size:10px;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-pill{
  display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);
}
.tl-pill-v{font-size:11px;font-weight:600;color:var(--mint);font-family:'Orbitron',monospace}
.lo-btn{
  width:28px;height:28px;border-radius:8px;border:1px solid var(--bd);
  background:transparent;color:var(--t3);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.lo-btn:hover{color:var(--t1);border-color:var(--bd2)}

/* 드롭존 */
.drop-zone{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  cursor:pointer;padding:28px;border:2px dashed transparent;
  transition:all .3s;position:relative;
}
.drop-zone::before{
  content:'';position:absolute;inset:16px;
  border:1px dashed rgba(124,58,237,.2);border-radius:20px;
  pointer-events:none;transition:all .3s;
}
.drop-zone:hover::before,.drop-zone.drag-over::before{
  border-color:rgba(124,58,237,.5);box-shadow:inset 0 0 40px rgba(124,58,237,.04);
}
.dz-ring{
  width:90px;height:90px;border-radius:50%;
  border:2px solid rgba(124,58,237,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;position:relative;
  box-shadow:0 0 30px var(--gp);
  animation:rp 3s ease-in-out infinite;
}
.dz-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(124,58,237,.12);
  animation:rp 3s ease-in-out infinite .5s;
}
@keyframes rp{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.dz-title{font-size:14px;font-weight:600;color:var(--t2)}
.dz-sub{font-size:11px;color:var(--t3);text-align:center;line-height:1.8}
.open-btn{
  padding:9px 22px;border-radius:9px;
  border:1px solid rgba(124,58,237,.4);background:rgba(124,58,237,.1);
  color:var(--purple2);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .25s;
}
.open-btn:hover{background:rgba(124,58,237,.2);box-shadow:0 0 20px var(--gp)}

/* 파일 뷰 */
#fileInfo{display:none;flex-direction:column;flex:1;overflow:hidden}

/* 비디오 */
.video-wrap{background:#000;flex-shrink:0;display:none;overflow:hidden}
.video-wrap video{width:100%;max-height:200px;display:block;object-fit:contain}

/* 디스크 */
.disc-section{
  display:flex;flex-direction:column;align-items:center;
  padding:18px 16px 10px;flex-shrink:0;position:relative;
}
.disc-section::before{
  content:'';position:absolute;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,var(--gp),transparent 70%);
  top:10px;pointer-events:none;
}
.disc{
  width:130px;height:130px;border-radius:50%;
  background:conic-gradient(from 0deg,#1a0a2e 0deg,#0a0a18 60deg,#1e0a3e 120deg,
    #0a1a2e 180deg,#0a0a18 240deg,#2a0a3e 300deg,#1a0a2e 360deg);
  border:2px solid rgba(124,58,237,.3);
  display:flex;align-items:center;justify-content:center;
  position:relative;margin-bottom:14px;
  box-shadow:0 0 0 1px rgba(255,255,255,.05),0 8px 40px rgba(0,0,0,.8),0 0 60px var(--gp);
  transition:box-shadow .5s;
}
.disc.playing{
  animation:spin 8s linear infinite;
  box-shadow:0 0 0 1px rgba(255,255,255,.08),0 8px 40px rgba(0,0,0,.8),
    0 0 80px var(--gp),0 0 120px rgba(0,229,160,.1);
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.disc::before{
  content:'';position:absolute;width:75%;height:75%;border-radius:50%;
  border:1px solid rgba(255,255,255,.06);
}
.disc-center{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--mint));
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#fff;font-family:'Orbitron',monospace;
  box-shadow:0 0 20px var(--gm);z-index:1;
}
.eq-bars{display:flex;align-items:flex-end;gap:3px;height:24px;margin-bottom:10px;opacity:0;transition:opacity .4s}
.eq-bars.active{opacity:1}
.eq-bar{
  width:4px;border-radius:2px;
  background:linear-gradient(to top,var(--purple),var(--mint2));
  animation:none;
}
.eq-bars.active .eq-bar:nth-child(1){animation:eq .6s ease-in-out infinite alternate;height:30%}
.eq-bars.active .eq-bar:nth-child(2){animation:eq .4s ease-in-out infinite alternate .1s;height:70%}
.eq-bars.active .eq-bar:nth-child(3){animation:eq .5s ease-in-out infinite alternate .05s;height:100%}
.eq-bars.active .eq-bar:nth-child(4){animation:eq .7s ease-in-out infinite alternate .15s;height:55%}
.eq-bars.active .eq-bar:nth-child(5){animation:eq .45s ease-in-out infinite alternate .08s;height:40%}
.eq-bars.active .eq-bar:nth-child(6){animation:eq .55s ease-in-out infinite alternate .12s;height:80%}
.eq-bars.active .eq-bar:nth-child(7){animation:eq .65s ease-in-out infinite alternate .03s;height:35%}
@keyframes eq{0%{transform:scaleY(.3)}100%{transform:scaleY(1)}}

.m-title{font-size:15px;font-weight:700;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.m-artist{font-size:12px;color:var(--t3);text-align:center;margin-top:3px}
.m-badge{
  display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;margin-top:6px;
  font-size:9px;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:.06em;
}
.m-badge.local{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.2);color:var(--mint)}
.m-badge.server{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);color:var(--purple2)}

/* TL 없음 배너 */
.tl-empty{
  display:none;margin:0 16px 8px;padding:12px 14px;border-radius:10px;
  background:rgba(255,77,109,.07);border:1px solid rgba(255,77,109,.2);
}
.tl-empty.show{display:block}
.tl-empty-t{font-size:12px;font-weight:700;color:var(--rose);margin-bottom:3px}
.tl-empty-d{font-size:10px;color:var(--t3);line-height:1.6}

/* 진행바 */
.prog-area{padding:0 18px;flex-shrink:0}
.prog-track{height:3px;border-radius:2px;background:rgba(255,255,255,.07);cursor:pointer;position:relative}
.prog-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--purple),var(--mint2));
  width:0%;transition:width .25s linear;position:relative;
}
.prog-fill::after{
  content:'';position:absolute;right:-4px;top:-4px;
  width:11px;height:11px;border-radius:50%;
  background:var(--mint2);box-shadow:0 0 8px var(--gm);
  opacity:0;transition:opacity .2s;
}
.prog-track:hover .prog-fill::after{opacity:1}
.time-row{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--t3);font-family:'Orbitron',monospace;margin-top:6px;
}

/* 컨트롤 */
.controls{
  display:flex;align-items:center;justify-content:center;
  gap:16px;padding:12px 16px;flex-shrink:0;
}
.ctrl{
  width:42px;height:42px;border-radius:50%;border:1px solid var(--bd2);
  background:rgba(255,255,255,.03);color:var(--t2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-family:inherit;
}
.ctrl:hover{color:var(--t1);border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.08)}
.ctrl.play{
  width:62px;height:62px;font-size:22px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  border:none;color:#fff;box-shadow:0 4px 24px var(--gp);transition:all .25s;
}
.ctrl.play:hover{transform:scale(1.08);box-shadow:0 8px 36px var(--gp)}
.ctrl.play.playing{
  background:linear-gradient(135deg,var(--purple2),var(--mint));
  box-shadow:0 4px 24px var(--gm);
}

/* TL 미터 */
.tl-meter{
  display:flex;align-items:center;gap:10px;
  padding:6px 18px 4px;flex-shrink:0;
}
.tl-ml{font-size:9px;color:var(--t3);font-family:'Orbitron',monospace;letter-spacing:.06em;flex-shrink:0}
.tl-mt{flex:1;height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden}
.tl-mf{height:100%;background:linear-gradient(90deg,var(--purple),var(--mint2));border-radius:1px;transition:width .8s ease}
.tl-mv{font-size:10px;font-weight:700;color:var(--mint);font-family:'Orbitron',monospace;flex-shrink:0;min-width:60px;text-align:right}

/* 상태 */
.p-status{font-size:10px;text-align:center;padding:4px 16px 0;color:var(--t3);min-height:20px}
.p-status.error{color:var(--rose)}
.p-status.ok{color:var(--mint)}
.p-status.warn{color:var(--gold)}

/* 하단 바 */
.bottom-bar{
  display:flex;align-items:center;justify-content:center;
  padding:8px 16px 10px;flex-shrink:0;
  border-top:1px solid var(--bd);background:rgba(5,5,8,.6);
}
.rst-btn{
  font-size:11px;color:var(--t3);background:none;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:color .2s;
  display:flex;align-items:center;gap:5px;
}
.rst-btn:hover{color:var(--t2)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:2px}
</style>
</head>
<body>

<div class="titlebar">
  <div class="tb-logo">TL</div>
  <span class="tb-name">TIMELINK PLAYER</span>
  <span class="tb-ver">v1.0.0</span>
</div>

<!-- 로그인 -->
<div id="loginScreen">
  <div class="li-icon">⚡</div>
  <div class="li-title">TIMELINK</div>
  <div class="li-sub">계정 로그인 후 .tl 파일을 재생하세요<br>TL 잔액이 있어야 재생됩니다</div>
  <div class="fw"><span class="fi">✉</span>
    <input class="inp" type="email" id="emailInp" placeholder="이메일"
      onkeydown="if(event.key==='Enter')document.getElementById('pwInp').focus()">
  </div>
  <div class="fw"><span class="fi">🔑</span>
    <input class="inp" type="password" id="pwInp" placeholder="비밀번호"
      onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="li-btn" id="loginBtn" onclick="doLogin()">로그인</button>
  <div class="li-st" id="loginStatus"></div>
</div>

<!-- 플레이어 -->
<div id="playerScreen">
  <div class="user-bar">
    <div class="ue" id="userEmail">-</div>
    <div class="tl-pill">
      <span style="font-size:10px">⚡</span>
      <span class="tl-pill-v" id="tlVal">-</span>
    </div>
    <button class="lo-btn" onclick="doLogout()" title="로그아웃">↩</button>
  </div>

  <!-- 드롭존 -->
  <div class="drop-zone" id="dropZone"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="onDrop(event)">
    <div class="dz-ring">📂</div>
    <div class="dz-title">.tl 파일을 드롭하세요</div>
    <div class="dz-sub">오디오(.tl3) · 영상(.tl4)<br>TL 잔액이 있어야 재생됩니다</div>
    <button class="open-btn" onclick="openFile()">📁 파일 선택</button>
  </div>

  <!-- 파일 뷰 -->
  <div id="fileInfo">
    <div class="video-wrap" id="videoWrap">
      <video id="videoEl" playsinline></video>
    </div>
    <div class="disc-section" id="discSection">
      <div class="disc" id="discEl">
        <div class="disc-center">TL</div>
      </div>
      <div class="eq-bars" id="eqBars">
        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>
      <div class="m-title" id="fileTitle">—</div>
      <div class="m-artist" id="fileArtist">—</div>
      <span class="m-badge local" id="metaBadge">🔒 LOCAL</span>
    </div>

    <div class="tl-empty" id="tlEmptyBanner">
      <div class="tl-empty-t">⚡ TL 잔액 없음</div>
      <div class="tl-empty-d">timelink.digital에서 TL을 충전해주세요.</div>
    </div>

    <div class="prog-area">
      <div class="prog-track" id="progTrack" onclick="seekTo(event)">
        <div class="prog-fill" id="progFill"></div>
      </div>
      <div class="time-row">
        <span id="timeEl">0:00</span>
        <span id="durEl">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl" onclick="seekRel(-10)">⏮</button>
      <button class="ctrl play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl" onclick="seekRel(10)">⏭</button>
    </div>

    <div class="tl-meter">
      <span class="tl-ml">TL</span>
      <div class="tl-mt"><div class="tl-mf" id="tlMF" style="width:100%"></div></div>
      <span class="tl-mv" id="tlMV">— TL</span>
    </div>

    <div class="p-status" id="pStatus"></div>

    <div class="bottom-bar">
      <button class="rst-btn" onclick="resetPlayer()">📂 다른 파일 열기</button>
    </div>
  </div>
</div>

<audio id="audioEl" style="display:none"></audio>

<script>
const API = 'https://api.timelink.digital';
let _token=null, _user=null, _header=null, _shareId=null;
let _playing=false, _isVideo=false, _tlMax=0;
const _audio = document.getElementById('audioEl');
const _video = document.getElementById('videoEl');
let _tick = null;

// ── 초기화 ──
(async function(){
  _token = await tlAPI.storeGet('tl_token');
  const uj = await tlAPI.storeGet('tl_user');
  if(_token && uj){ _user = JSON.parse(uj); showPlayer(); }
  else showLogin();
  tlAPI.onTLFileOpen(fp => loadTLFile(fp));
  tlAPI.onProgress(bytes => setSt('⏳ 다운로드 '+(bytes/1048576).toFixed(1)+'MB'));
})();

function showLogin(){
  document.getElementById('loginScreen').classList.add('show');
  document.getElementById('playerScreen').classList.remove('show');
}
function showPlayer(){
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('playerScreen').classList.add('show');
  document.getElementById('userEmail').textContent = _user?.email||'';
  updateTL();
}

// ── 로그인 ──
async function doLogin(){
  const email = document.getElementById('emailInp').value.trim();
  const pw    = document.getElementById('pwInp').value;
  if(!email||!pw){ setLSt('이메일과 비밀번호를 입력하세요','error'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='연결 중...';
  try{
    const r = await fetch(API+'/api/auth/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:pw})
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.error||'HTTP '+r.status);
    _token=d.token; _user=d.user;
    await tlAPI.storeSet('tl_token',_token);
    await tlAPI.storeSet('tl_user',JSON.stringify(_user));
    showPlayer();
  }catch(e){
    setLSt('❌ '+e.message,'error');
    btn.disabled=false; btn.textContent='로그인';
  }
}
function doLogout(){
  _token=null; _user=null;
  tlAPI.storeSet('tl_token',null); tlAPI.storeSet('tl_user',null);
  stopPB(); showLogin();
}

// ── .tl 파일 로드 ──
async function loadTLFile(fp){
  setSt('⏳ 파싱 중...');
  await tlAPI.storeSet('_fp', fp);
  const p = await tlAPI.parseTLFile(fp);
  if(p.error){ setSt('❌ '+p.error,'error'); return; }

  _header  = p.header;
  _shareId = _header.shareId;
  if(p.decrypted) _header._dec = p.decrypted;

  const ft  = (_header.fileType||'').toLowerCase();
  const ext = (fp||'').split('.').pop()?.toLowerCase()||'';
  _isVideo  = ft.startsWith('video')||ext==='tl4'||_header.category_type==='video';

  // UI
  document.getElementById('dropZone').style.display='none';
  const fi = document.getElementById('fileInfo');
  fi.style.display='flex'; fi.style.flexDirection='column';

  document.getElementById('fileTitle').textContent  = _header.title||'제목 없음';
  document.getElementById('fileArtist').textContent = _header.artist||_header.creatorName||'—';
  document.getElementById('durEl').textContent      = fmtT(_header.duration||0);

  const badge = document.getElementById('metaBadge');
  if(p.needsServerDecrypt){ badge.textContent='🌐 SERVER'; badge.className='m-badge server'; }
  else                     { badge.textContent='🔒 LOCAL';  badge.className='m-badge local';  }

  document.getElementById('videoWrap').style.display   = _isVideo ? 'block' : 'none';
  document.getElementById('discSection').style.display = _isVideo ? 'none'  : 'flex';

  await updateTL();
  setTimeout(()=>togglePlay(), 400);
}

// ── 재생/정지 ──
async function togglePlay(){
  if(_playing){ stopPB(); return; }
  if(!_shareId){ setSt('파일을 먼저 열어주세요','warn'); return; }

  setSt('⏳ TL 잔액 확인 중...');
  document.getElementById('playBtn').textContent='⏳';

  const tlCk = await tlAPI.checkTL({token:_token});
  const tl   = tlCk.tl||0;
  if(_user) _user.tl=tl;
  _tlMax=tl;
  updateTL();

  if(tl<=0){
    document.getElementById('tlEmptyBanner').classList.add('show');
    setSt('⚡ TL 잔액 없음 — timelink.digital에서 충전하세요','error');
    document.getElementById('playBtn').textContent='▶';
    return;
  }
  document.getElementById('tlEmptyBanner').classList.remove('show');
  setSt('⏳ 복호화 중...');

  // 복호화
  let b64 = _header._dec || null;
  if(!b64 && _shareId){
    setSt('⏳ 서버 복호화 중...');
    const res = await tlAPI.decryptStream({shareId:_shareId, token:_token});
    if(res.error==='TL_INSUFFICIENT'){ setSt('⚡ TL 잔액 부족','error'); document.getElementById('playBtn').textContent='▶'; return; }
    if(!res.ok||!res.data){ setSt('❌ 복호화 실패: '+(res.error||'오류'),'error'); document.getElementById('playBtn').textContent='▶'; return; }
    b64 = res.data;
  }
  if(!b64){ setSt('❌ 복호화 데이터 없음','error'); document.getElementById('playBtn').textContent='▶'; return; }

  // Blob → 재생
  try{
    const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
    const mime  = _header.fileType||(_isVideo?'video/mp4':'audio/mpeg');
    const url   = URL.createObjectURL(new Blob([bytes],{type:mime}));
    const el    = _isVideo ? _video : _audio;
    el.src=url;
    el.ontimeupdate=onTU;
    el.onended=()=>stopPB();
    el.onerror=()=>{ setSt('❌ 재생 오류 ['+mime+']','error'); document.getElementById('playBtn').textContent='▶'; };
    await el.play();
    _playing=true;
    document.getElementById('playBtn').textContent='⏸';
    document.getElementById('playBtn').classList.add('playing');
    document.getElementById('discEl')?.classList.add('playing');
    document.getElementById('eqBars')?.classList.add('active');
    setSt('▶ 재생 중 · '+(_header.tl_per_sec||1)+' TL/s','ok');
    startTick();
  }catch(e){ setSt('❌ '+e.message,'error'); document.getElementById('playBtn').textContent='▶'; }
}

function stopPB(){
  _playing=false;
  _audio.pause(); _video.pause();
  document.getElementById('playBtn').textContent='▶';
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('discEl')?.classList.remove('playing');
  document.getElementById('eqBars')?.classList.remove('active');
  setSt(''); stopTick();
}

// ── Tick ──
function startTick(){
  stopTick();
  _tick = setInterval(async()=>{
    if(!_playing||!_shareId) return;
    const res = await tlAPI.tlTick({shareId:_shareId,token:_token,deduct_rate:_header?.tl_per_sec||1});
    if(res.code==='TL_EMPTY'||res.tl_balance===0){
      stopPB();
      document.getElementById('tlEmptyBanner').classList.add('show');
      setSt('⚡ TL 소진 — 재생 중단','error');
    } else if(res.ok&&_user){
      _user.tl=res.tl_balance; updateTL();
    }
  },1000);
}
function stopTick(){ if(_tick){clearInterval(_tick);_tick=null;} }

// ── 진행바 ──
function onTU(){
  const el  = _isVideo?_video:_audio;
  const dur = el.duration||_header?.duration||1;
  const cur = el.currentTime||0;
  document.getElementById('progFill').style.width=(cur/dur*100).toFixed(1)+'%';
  document.getElementById('timeEl').textContent=fmtT(Math.floor(cur));
}
function seekTo(e){
  const bar = document.getElementById('progTrack');
  const el  = _isVideo?_video:_audio;
  el.currentTime=(e.offsetX/bar.offsetWidth)*(el.duration||_header?.duration||0);
}
function seekRel(s){
  const el=_isVideo?_video:_audio;
  el.currentTime=Math.max(0,(el.currentTime||0)+s);
}

// ── 파일 열기 ──
async function openFile(){ const fp=await tlAPI.openFileDialog(); if(fp) loadTLFile(fp); }
function onDrop(e){
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const fp=e.dataTransfer.files[0]?.path;
  if(fp) loadTLFile(fp);
}
function resetPlayer(){
  stopPB(); _header=null; _shareId=null; _isVideo=false;
  document.getElementById('fileInfo').style.display='none';
  document.getElementById('dropZone').style.display='flex';
  document.getElementById('tlEmptyBanner').classList.remove('show');
  document.getElementById('progFill').style.width='0%';
  document.getElementById('timeEl').textContent='0:00';
  document.getElementById('durEl').textContent='0:00';
  setSt('');
}

// ── TL 잔액 ──
async function updateTL(){
  if(!_token||!_user) return;
  try{
    const r=await fetch(API+'/api/eco/wallet',{headers:{'Authorization':'Bearer '+_token}});
    if(r.ok){
      const d=await r.json();
      const w=d.wallet||d;
      const tl=Number(w.tl_total||0)||(Number(w.tl_p||0)+Number(w.tl_a||0)+Number(w.tl_b||0))||Number(w.tl||0);
      if(_user) _user.tl=tl;
      document.getElementById('tlVal').textContent=Number(tl).toLocaleString();
      document.getElementById('tlMV').textContent=Number(tl).toLocaleString()+' TL';
      if(_tlMax>0) document.getElementById('tlMF').style.width=Math.min(100,(tl/_tlMax)*100)+'%';
    }
  }catch(e){ console.error('[wallet]',e); }
}

// ── 유틸 ──
function fmtT(s){ return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function setSt(msg,type){
  const el=document.getElementById('pStatus');
  if(!el) return;
  el.textContent=msg; el.className='p-status'+(type?' '+type:'');
}
function setLSt(msg,type){
  const el=document.getElementById('loginStatus');
  if(!el) return;
  el.textContent=msg; el.className='li-st'+(type?' '+type:'');
}
</script>
