<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TimeLink Player</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--bg2:#0A0A12;--bg3:#0F0F1C;
  --purple:#7C3AED;--purple2:#A855F7;
  --mint:#00E5A0;--mint2:#00FFC4;
  --rose:#FF4D6D;--gold:#F59E0B;--blue:#38BDF8;
  --t1:#F8FAFC;--t2:#94A3B8;--t3:#475569;
  --bd:rgba(255,255,255,.06);--bd2:rgba(255,255,255,.12);
  --gp:rgba(124,58,237,.35);--gm:rgba(0,229,160,.25);
}
*{-webkit-user-select:none;user-select:none}
body{
  background:var(--bg);color:var(--t1);
  font-family:'DM Sans',sans-serif;
  height:100vh;display:flex;flex-direction:column;
  overflow:hidden;position:relative;
}
body::before{content:'';position:fixed;width:500px;height:500px;
  background:radial-gradient(circle,rgba(124,58,237,.07),transparent 70%);
  top:-100px;left:-100px;pointer-events:none;z-index:0;
  animation:bgP 8s ease-in-out infinite alternate;}
body::after{content:'';position:fixed;width:400px;height:400px;
  background:radial-gradient(circle,rgba(0,229,160,.05),transparent 70%);
  bottom:-80px;right:-80px;pointer-events:none;z-index:0;
  animation:bgP 10s ease-in-out infinite alternate-reverse;}
@keyframes bgP{0%{opacity:.5;transform:scale(1)}100%{opacity:1;transform:scale(1.2)}}

/* 타이틀바 */
.titlebar{height:40px;-webkit-app-region:drag;display:flex;align-items:center;
  padding:0 16px;gap:10px;background:rgba(5,5,8,.9);border-bottom:1px solid var(--bd);
  flex-shrink:0;position:relative;z-index:10;}
.tb-logo{width:24px;height:24px;border-radius:6px;
  background:linear-gradient(135deg,var(--purple),var(--mint));
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:9px;font-weight:900;color:#fff;
  box-shadow:0 0 12px var(--gp);}
.tb-name{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:.15em;
  background:linear-gradient(135deg,var(--t1),var(--t2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.tb-ver{font-size:9px;color:var(--t3);font-family:'Orbitron',monospace;margin-left:auto}

/* 로그인 */
#loginScreen{flex:1;display:none;flex-direction:column;
  align-items:center;justify-content:center;padding:32px;position:relative;z-index:1;}
#loginScreen.show{display:flex}
.li-icon{width:80px;height:80px;border-radius:22px;
  background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(0,229,160,.1));
  border:1px solid rgba(124,58,237,.4);
  display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:20px;
  box-shadow:0 0 40px var(--gp),inset 0 1px 0 rgba(255,255,255,.1);
  animation:flt 4s ease-in-out infinite;}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.li-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:.05em;
  background:linear-gradient(135deg,#fff 40%,var(--purple2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.li-sub{font-size:12px;color:var(--t3);text-align:center;margin-bottom:28px;line-height:1.7}
.fw{width:100%;max-width:280px;margin-bottom:10px;position:relative}
.fi{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.4}
.inp{width:100%;padding:11px 14px 11px 36px;border-radius:10px;
  border:1px solid var(--bd2);background:rgba(255,255,255,.03);
  color:var(--t1);font-size:13px;font-family:'DM Sans',sans-serif;
  outline:none;transition:all .25s;-webkit-user-select:text;user-select:text;}
.inp:focus{border-color:var(--purple2);background:rgba(124,58,237,.06);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.inp::placeholder{color:var(--t3)}
.li-btn{width:100%;max-width:280px;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .25s;margin-top:4px;box-shadow:0 4px 20px var(--gp);}
.li-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--gp)}
.li-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.li-st{font-size:11px;margin-top:10px;text-align:center;color:var(--t3);min-height:18px}
.li-st.error{color:var(--rose)} .li-st.ok{color:var(--mint)}

/* 플레이어 */
#playerScreen{flex:1;display:none;flex-direction:column;overflow:hidden;position:relative;z-index:1;}
#playerScreen.show{display:flex}

/* 유저 바 */
.user-bar{display:flex;align-items:center;padding:8px 14px;gap:8px;
  background:rgba(5,5,8,.8);border-bottom:1px solid var(--bd);flex-shrink:0;}
.ue{font-size:10px;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lo-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--bd);
  background:transparent;color:var(--t3);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lo-btn:hover{color:var(--t1);border-color:var(--bd2)}

/* 드롭존 */
.drop-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;cursor:pointer;padding:28px;border:2px dashed transparent;transition:all .3s;position:relative;}
.drop-zone::before{content:'';position:absolute;inset:16px;
  border:1px dashed rgba(124,58,237,.2);border-radius:20px;pointer-events:none;transition:all .3s;}
.drop-zone:hover::before,.drop-zone.drag-over::before{border-color:rgba(124,58,237,.5);}
.dz-ring{width:90px;height:90px;border-radius:50%;border:2px solid rgba(124,58,237,.25);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  box-shadow:0 0 30px var(--gp);animation:rp 3s ease-in-out infinite;position:relative;}
.dz-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(124,58,237,.12);animation:rp 3s ease-in-out infinite .5s;}
@keyframes rp{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
.dz-title{font-size:14px;font-weight:600;color:var(--t2)}
.dz-sub{font-size:11px;color:var(--t3);text-align:center;line-height:1.8}
.open-btn{padding:9px 22px;border-radius:9px;border:1px solid rgba(124,58,237,.4);
  background:rgba(124,58,237,.1);color:var(--purple2);font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .25s;}
.open-btn:hover{background:rgba(124,58,237,.2)}

/* 파일 뷰 */
#fileInfo{display:none;flex-direction:column;flex:1;overflow:hidden}

/* 비디오 */
.video-wrap{background:#000;flex-shrink:0;display:none;overflow:hidden}
.video-wrap video{width:100%;max-height:200px;display:block;object-fit:contain}

/* 디스크 */
.disc-section{display:flex;flex-direction:column;align-items:center;
  padding:16px 16px 8px;flex-shrink:0;position:relative;}
.disc-section::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,var(--gp),transparent 70%);top:10px;pointer-events:none;}
.disc{width:120px;height:120px;border-radius:50%;
  background:conic-gradient(from 0deg,#1a0a2e,#0a0a18 60deg,#1e0a3e 120deg,
    #0a1a2e 180deg,#0a0a18 240deg,#2a0a3e 300deg,#1a0a2e 360deg);
  border:2px solid rgba(124,58,237,.3);display:flex;align-items:center;justify-content:center;
  position:relative;margin-bottom:12px;
  box-shadow:0 0 0 1px rgba(255,255,255,.05),0 8px 40px rgba(0,0,0,.8),0 0 60px var(--gp);
  transition:box-shadow .5s;}
.disc.playing{animation:spin 8s linear infinite;
  box-shadow:0 0 0 1px rgba(255,255,255,.08),0 8px 40px rgba(0,0,0,.8),
    0 0 80px var(--gp),0 0 120px rgba(0,229,160,.1);}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.disc::before{content:'';position:absolute;width:75%;height:75%;border-radius:50%;border:1px solid rgba(255,255,255,.06);}
.disc-center{width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--mint));
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;color:#fff;font-family:'Orbitron',monospace;
  box-shadow:0 0 20px var(--gm);z-index:1;}
.eq-bars{display:flex;align-items:flex-end;gap:3px;height:22px;margin-bottom:8px;opacity:0;transition:opacity .4s}
.eq-bars.active{opacity:1}
.eq-bar{width:4px;border-radius:2px;background:linear-gradient(to top,var(--purple),var(--mint2))}
.eq-bars.active .eq-bar:nth-child(1){animation:eq .6s ease-in-out infinite alternate;height:30%}
.eq-bars.active .eq-bar:nth-child(2){animation:eq .4s ease-in-out infinite alternate .1s;height:70%}
.eq-bars.active .eq-bar:nth-child(3){animation:eq .5s ease-in-out infinite alternate .05s;height:100%}
.eq-bars.active .eq-bar:nth-child(4){animation:eq .7s ease-in-out infinite alternate .15s;height:55%}
.eq-bars.active .eq-bar:nth-child(5){animation:eq .45s ease-in-out infinite alternate .08s;height:40%}
.eq-bars.active .eq-bar:nth-child(6){animation:eq .55s ease-in-out infinite alternate .12s;height:80%}
.eq-bars.active .eq-bar:nth-child(7){animation:eq .65s ease-in-out infinite alternate .03s;height:35%}
@keyframes eq{0%{transform:scaleY(.3)}100%{transform:scaleY(1)}}
.m-title{font-size:15px;font-weight:700;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.m-artist{font-size:12px;color:var(--t3);text-align:center;margin-top:3px}

/* ── 핵심: 파일 TL 잔액 표시 ── */
.file-tl-box{
  margin:8px 16px;padding:12px 16px;border-radius:12px;
  background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);
  flex-shrink:0;
}
.ftl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ftl-label{font-size:9px;color:var(--t3);font-family:'Orbitron',monospace;letter-spacing:.08em}
.ftl-val{font-size:14px;font-weight:700;color:var(--mint);font-family:'Orbitron',monospace}
.ftl-track{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-bottom:6px}
.ftl-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--gold),var(--mint));
  border-radius:2px;transition:width .5s ease;}
.ftl-info{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);font-family:'Orbitron',monospace}

/* 재충전 버튼 */
.recharge-area{display:none;margin:0 16px 8px;flex-shrink:0}
.recharge-area.show{display:flex;gap:8px}
.rc-label{font-size:11px;color:var(--rose);flex:1;display:flex;align-items:center;gap:5px}
.rc-btn{padding:8px 16px;border-radius:9px;border:none;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff;font-size:11px;font-weight:700;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;
  box-shadow:0 2px 12px var(--gp);}
.rc-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--gp)}

/* 진행바 */
.prog-area{padding:0 16px;flex-shrink:0}
.prog-track{height:3px;border-radius:2px;background:rgba(255,255,255,.07);
  cursor:pointer;position:relative;}
.prog-fill{height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--purple),var(--mint2));
  width:0%;transition:width .25s linear;position:relative;}
.prog-fill::after{content:'';position:absolute;right:-4px;top:-4px;
  width:11px;height:11px;border-radius:50%;background:var(--mint2);
  box-shadow:0 0 8px var(--gm);opacity:0;transition:opacity .2s;}
.prog-track:hover .prog-fill::after{opacity:1}
.time-row{display:flex;justify-content:space-between;
  font-size:10px;color:var(--t3);font-family:'Orbitron',monospace;margin-top:5px;}

/* 컨트롤 */
.controls{display:flex;align-items:center;justify-content:center;
  gap:16px;padding:10px 16px;flex-shrink:0;}
.ctrl{width:42px;height:42px;border-radius:50%;border:1px solid var(--bd2);
  background:rgba(255,255,255,.03);color:var(--t2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ctrl:hover{color:var(--t1);border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.08)}
.ctrl.play{width:60px;height:60px;font-size:22px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  border:none;color:#fff;box-shadow:0 4px 24px var(--gp);}
.ctrl.play:hover{transform:scale(1.08);box-shadow:0 8px 36px var(--gp)}
.ctrl.play.playing{background:linear-gradient(135deg,var(--purple2),var(--mint));box-shadow:0 4px 24px var(--gm)}

/* 상태 */
.p-status{font-size:10px;text-align:center;padding:3px 16px;color:var(--t3);min-height:18px}
.p-status.error{color:var(--rose)} .p-status.ok{color:var(--mint)} .p-status.warn{color:var(--gold)}

/* 하단 */
.bottom-bar{display:flex;align-items:center;justify-content:center;
  padding:6px 16px 8px;flex-shrink:0;border-top:1px solid var(--bd);background:rgba(5,5,8,.6);}
.rst-btn{font-size:11px;color:var(--t3);background:none;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:color .2s;}
.rst-btn:hover{color:var(--t2)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.3);border-radius:2px}
</style>
</head>
<body>

<div class="titlebar">
  <div class="tb-logo">TL</div>
  <span class="tb-name">TIMELINK PLAYER</span>
  <span class="tb-ver">v1.0.0</span>
</div>

<!-- 로그인 -->
<div id="loginScreen">
  <div class="li-icon">⚡</div>
  <div class="li-title">TIMELINK</div>
  <div class="li-sub">계정 로그인 후 .tl 파일을 재생하세요<br>파일에 충전된 TL로 재생됩니다</div>
  <div class="fw"><span class="fi">✉</span>
    <input class="inp" type="email" id="emailInp" placeholder="이메일"
      onkeydown="if(event.key==='Enter')document.getElementById('pwInp').focus()">
  </div>
  <div class="fw"><span class="fi">🔑</span>
    <input class="inp" type="password" id="pwInp" placeholder="비밀번호"
      onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="li-btn" id="loginBtn" onclick="doLogin()">로그인</button>
  <div class="li-st" id="loginStatus"></div>
</div>

<!-- 플레이어 -->
<div id="playerScreen">
  <div class="user-bar">
    <div class="ue" id="userEmail">-</div>
    <button class="lo-btn" onclick="doLogout()" title="로그아웃">↩</button>
  </div>

  <!-- 드롭존 -->
  <div class="drop-zone" id="dropZone"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="onDrop(event)">
    <div class="dz-ring">📂</div>
    <div class="dz-title">.tl 파일을 드롭하세요</div>
    <div class="dz-sub">오디오(.tl3) · 영상(.tl4) · 이미지(.tlg) · 문서(.tld)<br>파일 안의 TL이 소진되면 재충전이 필요합니다</div>
    <button class="open-btn" onclick="openFile()">📁 파일 선택</button>
  </div>

  <!-- 파일 뷰 -->
  <div id="fileInfo">

    <!-- 비디오 -->
    <div class="video-wrap" id="videoWrap">
      <video id="videoEl" playsinline></video>
    </div>

    <!-- 디스크 (오디오) -->
    <div class="disc-section" id="discSection">
      <div class="disc" id="discEl">
        <div class="disc-center">TL</div>
      </div>
      <div class="eq-bars" id="eqBars">
        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>
      <div class="m-title" id="fileTitle">—</div>
      <div class="m-artist" id="fileArtist">—</div>
    </div>

    <!-- ★ 파일 TL 잔액 (핵심) ★ -->
    <div class="file-tl-box">
      <div class="ftl-header">
        <span class="ftl-label">⚡ 파일 TL 잔액 (충전된 TL)</span>
        <span class="ftl-val" id="fileTLVal">0 TL</span>
      </div>
      <div class="ftl-track">
        <div class="ftl-fill" id="fileTLFill" style="width:100%"></div>
      </div>
      <div class="ftl-info">
        <span id="fileTLTime">남은 재생시간: -</span>
        <span id="fileTLPerSec">1 TL/s</span>
      </div>
    </div>

    <!-- TL 소진 → 재충전 -->
    <div class="recharge-area" id="rechargeArea">
      <span class="rc-label">⚡ TL 소진 — 재충전이 필요합니다</span>
      <button class="rc-btn" onclick="doRecharge()" id="rcBtn">💳 재충전하기</button>
    </div>

    <!-- 진행바 -->
    <div class="prog-area">
      <div class="prog-track" id="progTrack" onclick="seekTo(event)">
        <div class="prog-fill" id="progFill"></div>
      </div>
      <div class="time-row">
        <span id="timeEl">0:00</span>
        <span id="durEl">0:00</span>
      </div>
    </div>

    <!-- 컨트롤 -->
    <div class="controls">
      <button class="ctrl" onclick="seekRel(-10)">⏮</button>
      <button class="ctrl play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl" onclick="seekRel(10)">⏭</button>
    </div>

    <div class="p-status" id="pStatus"></div>

    <div class="bottom-bar">
      <button class="rst-btn" onclick="resetPlayer()">📂 다른 파일 열기</button>
    </div>
  </div>
</div>

<audio id="audioEl" style="display:none"></audio>

<script>
const API = 'https://api.timelink.digital';

let _token=null, _user=null;
let _filePath=null, _header=null, _shareId=null;
let _fileTL=0, _fileTLMax=0, _tlPerSec=1;
let _playing=false, _isVideo=false;
const _audio=document.getElementById('audioEl');
const _video=document.getElementById('videoEl');
let _tick=null, _pocBuf=0;

// ── 초기화 ──
(async function(){
  _token = await tlAPI.storeGet('tl_token');
  const uj = await tlAPI.storeGet('tl_user');
  if(_token && uj){ _user=JSON.parse(uj); showPlayer(); }
  else showLogin();
  tlAPI.onTLFileOpen(fp => loadTLFile(fp));
})();

function showLogin(){
  document.getElementById('loginScreen').classList.add('show');
  document.getElementById('playerScreen').classList.remove('show');
}
function showPlayer(){
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('playerScreen').classList.add('show');
  document.getElementById('userEmail').textContent = _user?.email||'';
}

// ── 로그인 ──
async function doLogin(){
  const email=document.getElementById('emailInp').value.trim();
  const pw=document.getElementById('pwInp').value;
  if(!email||!pw){ setLSt('이메일과 비밀번호를 입력하세요','error'); return; }
  const btn=document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='연결 중...';
  try{
    const d = await tlAPI.login({email, password:pw});
    if(!d.ok) throw new Error(d.error||'로그인 실패');
    _token=d.token; _user=d.user;
    await tlAPI.storeSet('tl_token',_token);
    await tlAPI.storeSet('tl_user',JSON.stringify(_user));
    showPlayer();
  }catch(e){
    setLSt('❌ '+e.message,'error');
    btn.disabled=false; btn.textContent='로그인';
  }
}
function doLogout(){
  _token=null;_user=null;
  tlAPI.storeSet('tl_token',null); tlAPI.storeSet('tl_user',null);
  stopPB(); showLogin();
}

// ── .tl 파일 로드 ──
async function loadTLFile(fp){
  setSt('⏳ 파싱 중...');
  const p = await tlAPI.parseTLFile(fp);
  if(p.error){ setSt('❌ '+p.error,'error'); return; }

  _filePath  = fp;
  _header    = p.header;
  _shareId   = _header.shareId;
  _fileTL    = p.tl_balance;    // ★ 파일에 충전된 TL
  _fileTLMax = p.tl_max || p.tl_balance;
  _tlPerSec  = p.tl_per_sec;

  if(p.decrypted) _header._dec = p.decrypted;

  const ft  = (_header.fileType||'').toLowerCase();
  const ext = (fp||'').split('.').pop()?.toLowerCase()||'';
  _isVideo  = ft.startsWith('video')||ext==='tl4'||_header.category_type==='video';

  // UI
  document.getElementById('dropZone').style.display='none';
  const fi=document.getElementById('fileInfo');
  fi.style.display='flex'; fi.style.flexDirection='column';

  document.getElementById('fileTitle').textContent  = _header.title||'제목 없음';
  document.getElementById('fileArtist').textContent = _header.artist||_header.creatorName||'—';
  document.getElementById('durEl').textContent      = fmtT(_header.duration||0);
  document.getElementById('videoWrap').style.display   = _isVideo?'block':'none';
  document.getElementById('discSection').style.display = _isVideo?'none':'flex';

  updateFileTLDisplay();

  // TL=0이면 재충전 안내 (자동재생 안 함)
  if(_fileTL <= 0){
    document.getElementById('rechargeArea').classList.add('show');
    setSt('⚡ 파일 TL 소진 — 재충전 후 재생하세요','warn');
    return;
  }

  setSt('✅ '+_fileTL.toLocaleString()+' TL 충전됨 · ▶ 눌러 재생','ok');
  setTimeout(()=>togglePlay(), 400);
}

// ── 재생/정지 ──
async function togglePlay(){
  if(_playing){ stopPB(); return; }
  if(!_filePath){ setSt('파일을 먼저 열어주세요','warn'); return; }

  // ★ 핵심: 파일 자체의 TL 확인
  if(_fileTL <= 0){
    document.getElementById('rechargeArea').classList.add('show');
    setSt('⚡ 파일 TL 소진 — 재충전이 필요합니다','error');
    return;
  }

  setSt('⏳ 복호화 중...');
  document.getElementById('playBtn').textContent='⏳';

  // 복호화 (로컬 XOR)
  let b64 = _header._dec || null;
  if(!b64){
    setSt('❌ 복호화 키 없음 — 파일을 다시 다운로드하세요','error');
    document.getElementById('playBtn').textContent='▶';
    return;
  }

  try{
    const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
    const mime  = _header.fileType||(_isVideo?'video/mp4':'audio/mpeg');
    const url   = URL.createObjectURL(new Blob([bytes],{type:mime}));
    const el    = _isVideo?_video:_audio;
    el.src=url;
    el.ontimeupdate=onTU;
    el.onended=()=>stopPB();
    el.onerror=()=>{ setSt('❌ 재생 오류 ['+mime+']','error'); document.getElementById('playBtn').textContent='▶'; };
    await el.play();

    _playing=true;
    document.getElementById('playBtn').textContent='⏸';
    document.getElementById('playBtn').classList.add('playing');
    document.getElementById('discEl')?.classList.add('playing');
    document.getElementById('eqBars')?.classList.add('active');
    setSt('▶ 재생 중 · '+_tlPerSec+' TL/s','ok');
    startTick();
  }catch(e){
    setSt('❌ '+e.message,'error');
    document.getElementById('playBtn').textContent='▶';
  }
}

function stopPB(){
  _playing=false;
  _audio.pause(); _video.pause();
  document.getElementById('playBtn').textContent='▶';
  document.getElementById('playBtn').classList.remove('playing');
  document.getElementById('discEl')?.classList.remove('playing');
  document.getElementById('eqBars')?.classList.remove('active');
  setSt('');
  flushPOC(); // 남은 POC 전송
  stopTick();
}

// ── ★ 핵심: 파일 TL 차감 tick ──
function startTick(){
  stopTick();
  _tick = setInterval(async()=>{
    if(!_playing) return;

    // 1. 파일 TL 차감 (로컬)
    _fileTL = Math.max(0, _fileTL - _tlPerSec);
    await tlAPI.updateTLBalance({ filePath:_filePath, newBalance:_fileTL });
    updateFileTLDisplay();
    _pocBuf += _tlPerSec; // POC 버퍼

    // 2. TL 소진 → 재생 중단
    if(_fileTL <= 0){
      stopPB();
      document.getElementById('rechargeArea').classList.add('show');
      setSt('⚡ 파일 TL 소진 — 재충전 후 계속 재생하세요','error');
      return;
    }

    // 3. 10초마다 POC 서버 기록 (오프라인이어도 무방)
    if(_pocBuf >= 10 && _shareId && _token){
      flushPOC();
    }
  }, 1000);
}
function stopTick(){ if(_tick){clearInterval(_tick);_tick=null;} }

// POC 서버 기록
async function flushPOC(){
  if(_pocBuf<=0 || !_shareId || !_token) return;
  const sec = _pocBuf; _pocBuf=0;
  try{
    await tlAPI.recordPOC({ shareId:_shareId, token:_token, seconds:sec, deduct_rate:_tlPerSec });
  }catch(e){ /* 오프라인이어도 OK */ }
}

// ── 재충전 ──
async function doRecharge(){
  if(!_token){ setSt('로그인 후 재충전하세요','warn'); return; }

  // 재충전 금액 선택
  const choices = [3600, 7200, 18000, 36000];
  const labels  = ['1시간 (3,600 TL)','2시간 (7,200 TL)','5시간 (18,000 TL)','10시간 (36,000 TL)'];
  const pick = choices[1]; // 기본 2시간
  const amount = _fileTLMax > 0 ? _fileTLMax : pick;

  setSt('⏳ 재충전 중...');
  try{
    const res = await tlAPI.rechargeTL({
      filePath: _filePath,
      shareId:  _shareId || null,
      token:    _token,
      amount:   amount
    });
    if(res.error) throw new Error(res.error);

    _fileTL    = res.new_balance;
    _fileTLMax = Math.max(_fileTLMax || amount, _fileTL);
    updateFileTLDisplay();
    document.getElementById('rechargeArea').classList.remove('show');

    if(res.local_only){
      setSt('✅ '+amount.toLocaleString()+' TL 충전 완료 (로컬)','ok');
    } else {
      setSt('✅ '+amount.toLocaleString()+' TL 재충전 완료!','ok');
      if(res.creator_share || res.platform_share){
        setTimeout(()=>setSt(
          '창작자 '+(res.creator_share||0).toLocaleString()+' TL · 플랫폼 '+(res.platform_share||0).toLocaleString()+' TL 분배 완료','ok'
        ),1500);
      }
    }
  }catch(e){ setSt('❌ 재충전 실패: '+e.message,'error'); }
}

// ── 파일 TL 표시 업데이트 ──
function updateFileTLDisplay(){
  const pct = _fileTLMax>0 ? Math.max(0,Math.min(100,(_fileTL/_fileTLMax)*100)) : 0;
  document.getElementById('fileTLVal').textContent  = Number(_fileTL).toLocaleString()+' TL';
  document.getElementById('fileTLFill').style.width = pct+'%';
  document.getElementById('fileTLPerSec').textContent = _tlPerSec+' TL/s';
  const remainSec = _tlPerSec>0 ? Math.floor(_fileTL/_tlPerSec) : 0;
  document.getElementById('fileTLTime').textContent = '남은 재생시간: '+fmtT(remainSec);

  // 잔량 낮으면 경고색
  const fill = document.getElementById('fileTLFill');
  if(pct < 10) fill.style.background = 'var(--rose)';
  else if(pct < 30) fill.style.background = 'linear-gradient(90deg,var(--rose),var(--gold))';
  else fill.style.background = 'linear-gradient(90deg,var(--rose),var(--gold),var(--mint))';
}

// ── 진행바 ──
function onTU(){
  const el=_isVideo?_video:_audio;
  const dur=el.duration||_header?.duration||1;
  const cur=el.currentTime||0;
  document.getElementById('progFill').style.width=(cur/dur*100).toFixed(1)+'%';
  document.getElementById('timeEl').textContent=fmtT(Math.floor(cur));
}
function seekTo(e){
  const bar=document.getElementById('progTrack');
  const el=_isVideo?_video:_audio;
  el.currentTime=(e.offsetX/bar.offsetWidth)*(el.duration||_header?.duration||0);
}
function seekRel(s){ const el=_isVideo?_video:_audio; el.currentTime=Math.max(0,(el.currentTime||0)+s); }

// ── 파일 열기 ──
async function openFile(){ const fp=await tlAPI.openFileDialog(); if(fp) loadTLFile(fp); }
function onDrop(e){
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const fp=e.dataTransfer.files[0]?.path;
  if(fp) loadTLFile(fp);
}
function resetPlayer(){
  stopPB();
  _filePath=null;_header=null;_shareId=null;_fileTL=0;_isVideo=false;
  document.getElementById('fileInfo').style.display='none';
  document.getElementById('dropZone').style.display='flex';
  document.getElementById('rechargeArea').classList.remove('show');
  document.getElementById('progFill').style.width='0%';
  document.getElementById('timeEl').textContent='0:00';
  document.getElementById('durEl').textContent='0:00';
  setSt('');
}

// ── 유틸 ──
function fmtT(s){ return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function setSt(msg,type){
  const el=document.getElementById('pStatus');
  if(!el) return;
  el.textContent=msg; el.className='p-status'+(type?' '+type:'');
}
function setLSt(msg,type){
  const el=document.getElementById('loginStatus');
  if(!el) return;
  el.textContent=msg; el.className='li-st'+(type?' '+type:'');
}
</script>
