<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TimeLink Player</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050508;--bg2:#0A0A14;--bg3:#10101E;
  --purple:#7C3AED;--purple2:#A855F7;
  --mint:#00E5A0;--rose:#FF4D6D;--gold:#F59E0B;
  --t1:#F1F5F9;--t2:#94A3B8;--t3:#475569;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --gp:rgba(124,58,237,.3);
}
*{-webkit-user-select:none;user-select:none}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 타이틀바 */
.titlebar{
  height:38px;-webkit-app-region:drag;
  display:flex;align-items:center;padding:0 14px;gap:8px;
  background:rgba(5,5,8,.95);border-bottom:1px solid var(--bd);flex-shrink:0;
}
.tb-logo{width:20px;height:20px;border-radius:5px;
  background:linear-gradient(135deg,var(--purple),var(--mint));
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:7px;font-weight:900;color:#fff}
.tb-name{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:.15em;color:var(--t2)}
.tb-ver{font-size:8px;color:var(--t3);font-family:monospace;margin-left:auto}

/* 유저 바 */
.user-bar{
  display:flex;align-items:center;padding:5px 12px;gap:8px;
  background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;
}
.ub-info{font-size:10px;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ub-tl{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;
  background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.15);}
.ub-tl-val{font-size:10px;font-weight:700;color:var(--mint);font-family:monospace}
.ub-login-btn{padding:3px 10px;border-radius:6px;border:1px solid rgba(124,58,237,.3);
  background:rgba(124,58,237,.08);color:var(--purple2);font-size:10px;
  cursor:pointer;font-family:'DM Sans',sans-serif}
.ub-logout{width:24px;height:24px;border-radius:5px;border:1px solid var(--bd);
  background:transparent;color:var(--t3);font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center}

/* 로그인 패널 */
.login-panel{
  position:absolute;top:64px;left:0;right:0;z-index:200;
  background:var(--bg2);border-bottom:1px solid var(--bd);
  padding:14px 16px;display:none;flex-direction:column;gap:8px;align-items:center;
}
.login-panel.show{display:flex}
.lp-inp{width:100%;max-width:280px;padding:8px 12px;border-radius:8px;
  border:1px solid var(--bd2);background:rgba(255,255,255,.03);
  color:var(--t1);font-size:12px;outline:none;
  -webkit-user-select:text;user-select:text;font-family:'DM Sans',sans-serif}
.lp-inp::placeholder{color:var(--t3)}
.lp-inp:focus{border-color:var(--purple2)}
.lp-btn{width:100%;max-width:280px;padding:9px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.lp-err{font-size:10px;color:var(--rose);text-align:center}

/* 메인 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── 비디오 영역 ── */
.video-area{
  background:#000;display:none;position:relative;flex-shrink:0;
  border-bottom:1px solid var(--bd);
}
.video-area.show{display:block}
.video-area video{width:100%;height:200px;display:block;object-fit:contain}
.video-fullscreen-btn{
  position:absolute;bottom:8px;right:8px;
  width:28px;height:28px;border-radius:6px;
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-app-region:no-drag;transition:all .2s;
}
.video-fullscreen-btn:hover{background:rgba(124,58,237,.6)}

/* ── 현재 재생 ── */
.now-playing{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd)}

.cover-row{display:flex;align-items:center;gap:12px;padding:12px 14px 8px}
.disc{
  width:52px;height:52px;border-radius:50%;flex-shrink:0;position:relative;
  background:conic-gradient(from 0deg,#1a0a2e,#0a0a18 60deg,#1e0a3e 120deg,
    #0a1a2e 180deg,#0a0a18 240deg,#2a0a3e 300deg,#1a0a2e);
  border:2px solid rgba(124,58,237,.25);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px var(--gp);
}
.disc::before{content:'';position:absolute;width:68%;height:68%;border-radius:50%;
  border:1px solid rgba(255,255,255,.05)}
.disc.spin{animation:spin 6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.disc-c{width:16px;height:16px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--mint));
  font-size:5px;font-weight:900;color:#fff;font-family:'Orbitron',monospace;
  display:flex;align-items:center;justify-content:center;z-index:1}
.np-info{flex:1;min-width:0}
.np-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-size:10px;color:var(--t3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-type{font-size:9px;font-family:monospace;padding:2px 6px;border-radius:4px;margin-top:3px;
  display:inline-block;background:rgba(124,58,237,.15);color:var(--purple2)}

/* EQ */
.eq{display:flex;align-items:flex-end;gap:2px;height:14px;opacity:0;transition:opacity .3s;flex-shrink:0}
.eq.on{opacity:1}
.eq-b{width:3px;border-radius:1px;background:linear-gradient(to top,var(--purple),var(--mint))}
.eq.on .eq-b:nth-child(1){animation:eq .6s ease-in-out infinite alternate;height:35%}
.eq.on .eq-b:nth-child(2){animation:eq .4s ease-in-out infinite alternate .1s;height:100%}
.eq.on .eq-b:nth-child(3){animation:eq .5s ease-in-out infinite alternate .05s;height:65%}
.eq.on .eq-b:nth-child(4){animation:eq .7s ease-in-out infinite alternate .15s;height:45%}
@keyframes eq{0%{transform:scaleY(.2)}100%{transform:scaleY(1)}}

/* 파일 TL */
.file-tl{margin:0 14px 8px;padding:9px 12px;border-radius:9px;
  background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.16)}
.ftl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.ftl-label{font-size:8px;color:var(--t3);font-family:monospace;letter-spacing:.05em}
.ftl-val{font-size:14px;font-weight:700;color:var(--mint);font-family:monospace}
.ftl-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-bottom:4px}
.ftl-fill{height:100%;border-radius:2px;transition:width .5s}
.ftl-info{display:flex;justify-content:space-between;font-size:8px;color:var(--t3);font-family:monospace}

/* 재충전 배너 */
.rc-bar{display:none;margin:0 14px 8px;padding:9px 12px;border-radius:9px;
  background:rgba(255,77,109,.07);border:1px solid rgba(255,77,109,.2);
  align-items:center;gap:8px}
.rc-bar.show{display:flex}
.rc-txt{font-size:11px;color:var(--rose);flex:1;line-height:1.4}
.rc-btn{padding:6px 14px;border-radius:7px;border:none;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}

/* 진행바 */
.prog{padding:0 14px;flex-shrink:0}
.prog-track{height:3px;background:rgba(255,255,255,.07);border-radius:2px;cursor:pointer}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--mint));
  width:0%;border-radius:2px;transition:width .2s linear}
.time-row{display:flex;justify-content:space-between;
  font-size:9px;color:var(--t3);font-family:monospace;margin-top:4px}

/* 컨트롤 */
.controls{display:flex;align-items:center;justify-content:center;
  gap:10px;padding:8px 14px;flex-shrink:0}
.ctrl{width:34px;height:34px;border-radius:50%;border:1px solid var(--bd2);
  background:rgba(255,255,255,.03);color:var(--t2);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.ctrl:hover{color:var(--t1);border-color:rgba(124,58,237,.4)}
.ctrl.play{width:50px;height:50px;font-size:20px;border:none;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff;box-shadow:0 3px 16px var(--gp)}
.ctrl.play:hover{transform:scale(1.06)}
.ctrl.play.on{background:linear-gradient(135deg,var(--purple2),var(--mint))}

/* 상태 */
.p-st{font-size:9px;text-align:center;padding:2px 14px 6px;color:var(--t3);min-height:16px}
.p-st.err{color:var(--rose)}.p-st.ok{color:var(--mint)}.p-st.warn{color:var(--gold)}

/* ── 플레이리스트 ── */
.pl-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;border-top:1px solid var(--bd)}
.pl-head{display:flex;align-items:center;padding:7px 14px;gap:8px;
  background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0}
.pl-ttl{font-size:9px;font-weight:700;color:var(--t3);font-family:monospace;letter-spacing:.05em;flex:1}
.pl-cnt{font-size:9px;color:var(--t3);font-family:monospace}
.pl-add{padding:4px 10px;border-radius:6px;border:1px solid rgba(124,58,237,.25);
  background:rgba(124,58,237,.07);color:var(--purple2);font-size:10px;
  cursor:pointer;white-space:nowrap}
.pl-add:hover{background:rgba(124,58,237,.15)}

/* 빈 상태 */
.pl-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;padding:20px;position:relative}
.pl-empty::before{content:'';position:absolute;inset:8px;
  border:1px dashed rgba(124,58,237,.15);border-radius:10px;pointer-events:none}
.pl-empty:hover::before{border-color:rgba(124,58,237,.4)}
.pl-empty-ico{font-size:24px;opacity:.3}
.pl-empty-txt{font-size:11px;color:var(--t3);text-align:center;line-height:1.7}

/* 리스트 */
.pl-list{flex:1;overflow-y:auto;padding:2px 0}
.pl-item{display:flex;align-items:center;gap:8px;padding:7px 14px;
  cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.pl-item:hover{background:rgba(255,255,255,.025)}
.pl-item.cur{background:rgba(124,58,237,.07);border-left-color:var(--purple2)}
.pl-num{font-size:9px;color:var(--t3);font-family:monospace;width:16px;text-align:center;flex-shrink:0}
.pl-item.cur .pl-num{color:var(--purple2)}
.pl-ico{width:28px;height:28px;border-radius:6px;background:var(--bg3);
  border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.pl-inf{flex:1;min-width:0}
.pl-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-sub{font-size:9px;color:var(--t3);margin-top:1px}
.pl-tl{flex-shrink:0;text-align:right}
.pl-tl-v{font-size:9px;font-weight:700;color:var(--mint);font-family:monospace}
.pl-tl-e{font-size:9px;color:var(--rose);font-family:monospace}
.pl-del{width:18px;height:18px;border-radius:4px;border:none;
  background:transparent;color:var(--t3);font-size:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pl-del:hover{color:var(--rose);background:rgba(255,77,109,.1)}

/* 드롭 오버레이 */
.drop-ov{display:none;position:fixed;inset:0;z-index:999;
  background:rgba(124,58,237,.1);border:2px dashed rgba(124,58,237,.5);
  align-items:center;justify-content:center;flex-direction:column;gap:6px;
  backdrop-filter:blur(3px)}
.drop-ov.show{display:flex}
.drop-ov-txt{font-size:13px;font-weight:700;color:var(--purple2)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.2);border-radius:2px}
</style>
</head>
<body>

<!-- 드롭 오버레이 -->
<div class="drop-ov" id="dropOv">
  <div style="font-size:28px">📂</div>
  <div class="drop-ov-txt">.tl 파일을 여기에 놓으세요</div>
</div>

<!-- 타이틀바 -->
<div class="titlebar">
  <div class="tb-logo">TL</div>
  <span class="tb-name">TIMELINK PLAYER</span>
  <span class="tb-ver">v1.1.0</span>
</div>

<!-- 유저 바 -->
<div class="user-bar" style="position:relative">
  <div class="ub-info" id="ubInfo">로그인하면 내 TL 잔액이 표시됩니다</div>
  <div class="ub-tl" id="ubTLPill" style="display:none">
    <span style="font-size:9px">⚡</span>
    <span class="ub-tl-val" id="ubTLVal">0</span>
  </div>
  <button class="ub-login-btn" id="ubLoginBtn" onclick="toggleLoginPanel()">로그인</button>
  <button class="ub-logout" id="ubLogoutBtn" style="display:none" onclick="doLogout()">↩</button>

  <!-- 로그인 패널 -->
  <div class="login-panel" id="loginPanel">
    <input class="lp-inp" type="email" id="lpEmail" placeholder="이메일"
      onkeydown="if(event.key==='Enter')document.getElementById('lpPw').focus()">
    <input class="lp-inp" type="password" id="lpPw" placeholder="비밀번호"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lp-btn" id="lpBtn" onclick="doLogin()">로그인</button>
    <div class="lp-err" id="lpErr"></div>
  </div>
</div>

<!-- 메인 -->
<div class="main"
  ondragover="ev.preventDefault();document.getElementById('dropOv').classList.add('show')"
  ondragleave="if(!event.relatedTarget)document.getElementById('dropOv').classList.remove('show')"
  ondrop="onDrop(event)">

  <!-- 비디오 -->
  <div class="video-area" id="videoArea">
    <video id="videoEl" playsinline></video>
    <button class="video-fullscreen-btn" onclick="tlAPI.toggleFullscreen()" title="전체화면">⛶</button>
  </div>

  <!-- 현재 재생 -->
  <div class="now-playing">
    <div class="cover-row">
      <div class="disc" id="discEl"><div class="disc-c">TL</div></div>
      <div class="np-info">
        <div class="np-title" id="npTitle">재생 중인 파일 없음</div>
        <div class="np-artist" id="npArtist">.tl 파일을 추가하세요</div>
        <span class="np-type" id="npType" style="display:none"></span>
      </div>
      <div class="eq" id="eqEl">
        <div class="eq-b"></div><div class="eq-b"></div>
        <div class="eq-b"></div><div class="eq-b"></div>
      </div>
    </div>

    <!-- 파일 TL 잔액 -->
    <div class="file-tl">
      <div class="ftl-top">
        <span class="ftl-label">⚡ 파일 TL 잔액</span>
        <span class="ftl-val" id="ftlVal">— TL</span>
      </div>
      <div class="ftl-bar"><div class="ftl-fill" id="ftlFill" style="width:0%"></div></div>
      <div class="ftl-info">
        <span id="ftlRemain">남은 재생: —</span>
        <span id="ftlRate">— TL/s</span>
      </div>
    </div>

    <!-- TL 충전 (항상 표시) -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0">
      <div id="rcBar" class="rc-bar" style="display:none;flex:1;margin-right:8px">
        <span class="rc-txt">⚡ 파일 TL이 소진됐습니다</span>
      </div>
      <button class="rc-btn" onclick="doRecharge()" style="flex-shrink:0">⚡ 충전</button>
    </div>

    <!-- 진행바 -->
    <div class="prog">
      <div class="prog-track" id="progTrack" onclick="seekTo(event)">
        <div class="prog-fill" id="progFill"></div>
      </div>
      <div class="time-row">
        <span id="timeEl">0:00</span>
        <span id="durEl">0:00</span>
      </div>
    </div>

    <!-- 컨트롤 -->
    <div class="controls">
      <button class="ctrl" onclick="prevTrack()" title="이전">⏮</button>
      <button class="ctrl" onclick="seekRel(-10)" title="-10초">◀◀</button>
      <button class="ctrl play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl" onclick="seekRel(10)" title="+10초">▶▶</button>
      <button class="ctrl" onclick="nextTrack()" title="다음">⏭</button>
    </div>
    <div class="p-st" id="pSt"></div>
  </div>

  <!-- 플레이리스트 -->
  <div class="pl-wrap">
    <div class="pl-head">
      <span class="pl-ttl">PLAYLIST</span>
      <span class="pl-cnt" id="plCnt">0곡</span>
      <button class="pl-add" onclick="addFiles()">+ 추가</button>
    </div>
    <div class="pl-empty" id="plEmpty" onclick="addFiles()">
      <div class="pl-empty-ico">📂</div>
      <div class="pl-empty-txt">.tl 파일을 드롭하거나<br>+ 추가 버튼을 클릭하세요<br><small style="opacity:.5">.tl3 오디오 · .tl4 영상</small></div>
    </div>
    <div class="pl-list" id="plList" style="display:none"></div>
  </div>
</div>

<audio id="audioEl" style="display:none"></audio>

<script>
const API = 'https://api.timelink.digital';

// 상태
let _token=null, _user=null;
let _playlist=[], _curIdx=-1;
let _playing=false, _isVideo=false;
let _fp=null, _hdr=null, _shareId=null;
let _fileTL=0, _fileTLMax=0, _tlPerSec=1;
let _tick=null, _poc=0;

// 미디어 엘리먼트
const _audio = document.getElementById('audioEl');
const _video = document.getElementById('videoEl');
let _curEl   = _audio;

// 캐시
const _blobCache = new Map(); // fp → blobUrl
const _preCache  = new Map(); // fp → Audio (미리 로드)

// ── 초기화 ──
(async function(){
  _token = await tlAPI.storeGet('tl_token');
  const uj = await tlAPI.storeGet('tl_user');
  if(_token && uj){ _user=JSON.parse(uj); updateUserBar(); syncMyTL(); }

  tlAPI.onTLFileOpen(fp => addToPlaylist([fp], true));

  // 전체 드래그
  document.addEventListener('dragover', e=>{e.preventDefault(); document.getElementById('dropOv').classList.add('show');});
  document.addEventListener('dragleave', e=>{ if(!e.relatedTarget) document.getElementById('dropOv').classList.remove('show');});
})();

// ── 유저 바 ──
function updateUserBar(){
  const on = !!_user;
  document.getElementById('ubInfo').textContent = on ? (_user.email||'로그인됨') : '로그인하면 내 TL 잔액이 표시됩니다';
  document.getElementById('ubTLPill').style.display = on ? 'flex' : 'none';
  document.getElementById('ubLoginBtn').style.display = on ? 'none' : '';
  document.getElementById('ubLogoutBtn').style.display = on ? '' : 'none';
}
async function syncMyTL(){
  if(!_token) return;
  const r = await tlAPI.getMyTL({token:_token});
  if(r.ok) document.getElementById('ubTLVal').textContent = Number(r.tl).toLocaleString()+' TL';
}
function toggleLoginPanel(){
  document.getElementById('loginPanel').classList.toggle('show');
}
async function doLogin(){
  const email = document.getElementById('lpEmail').value.trim();
  const pw    = document.getElementById('lpPw').value;
  if(!email||!pw){ document.getElementById('lpErr').textContent='이메일과 비밀번호를 입력하세요'; return; }
  const btn = document.getElementById('lpBtn');
  btn.disabled=true; btn.textContent='연결 중...';
  document.getElementById('lpErr').textContent='';
  try{
    const d = await tlAPI.login({email,password:pw});
    if(!d.ok) throw new Error(d.error||'로그인 실패');
    _token=d.token; _user=d.user;
    await tlAPI.storeSet('tl_token',_token);
    await tlAPI.storeSet('tl_user',JSON.stringify(_user));
    updateUserBar(); syncMyTL();
    document.getElementById('loginPanel').classList.remove('show');
  }catch(e){ document.getElementById('lpErr').textContent='❌ '+e.message; }
  btn.disabled=false; btn.textContent='로그인';
}
function doLogout(){
  _token=null; _user=null;
  tlAPI.storeSet('tl_token',null); tlAPI.storeSet('tl_user',null);
  updateUserBar();
}

// ── 파일 추가 ──
async function addFiles(){
  const fps = await tlAPI.openFileDialog();
  if(fps&&fps.length) addToPlaylist(fps, _curIdx===-1);
}

async function addToPlaylist(fps, autoPlay=false){
  if(!fps||!fps.length) return;
  let firstNew=null;
  for(const fp of fps){
    if(_playlist.find(p=>p.fp===fp)) continue;
    setSt('⏳ 파일 읽는 중...');
    const p = await tlAPI.parseTLHeader(fp);
    if(p.error){ setSt('❌ '+p.error,'err'); continue; }
    const hdr = p.header||{};
    const ext = fp.split('.').pop()?.toLowerCase()||'';
    const isV = (hdr.fileType||'').toLowerCase().startsWith('video')||ext==='tl4';
    const track = {
      fp, hdr, isVideo:isV,
      tl_balance: Number(hdr.tl_balance||0),
      tl_per_sec: Number(hdr.tl_per_sec||1),
      tl_max:     Number(hdr.tl_max||hdr.file_tl||hdr.tl_balance||0),
      shareId:    hdr.shareId||null,
      icon: isV?'🎬':ext==='tlg'?'🖼️':ext==='tld'?'📄':'🎵',
      decrypted: null, decrypting: false,
    };
    _playlist.push(track);
    if(firstNew===null) firstNew=_playlist.length-1;

    // 백그라운드 복호화 + Blob 미리 생성
    const idx = _playlist.length-1;
    track.decrypting=true;
    tlAPI.decryptFile(fp).then(res=>{
      const t=_playlist[idx]; if(!t) return;
      t.decrypted=res.decrypted; t.decrypting=false;
      if(res.decrypted&&!_blobCache.has(fp)){
        try{
          const mime=t.hdr?.fileType||(t.isVideo?'video/mp4':'audio/mpeg');
          const bytes=Uint8Array.from(atob(res.decrypted),c=>c.charCodeAt(0));
          const url=URL.createObjectURL(new Blob([bytes],{type:mime}));
          _blobCache.set(fp,url);
          // 오디오만 Audio 엘리먼트 미리 로드
          if(!t.isVideo&&!_preCache.has(fp)){
            const a=new Audio(); a.preload='auto'; a.src=url;
            _preCache.set(fp,a);
          }
        }catch(e){}
      }
      renderPL();
    });
  }
  renderPL();
  if(firstNew!==null){
    setSt('✅ '+_playlist.length+'곡','ok');
    if(autoPlay||_curIdx===-1) playTrack(firstNew);
  }
}

// ── 트랙 재생 ──
async function playTrack(idx){
  if(idx<0||idx>=_playlist.length) return;
  stopPB(false);
  _curIdx=idx;
  const t=_playlist[idx];
  _fp=t.fp; _hdr=t.hdr; _shareId=t.shareId;
  _fileTL=t.tl_balance; _fileTLMax=t.tl_max||t.tl_balance||3600;
  _tlPerSec=t.tl_per_sec; _isVideo=t.isVideo;

  // UI
  document.getElementById('npTitle').textContent  = _hdr?.title||'제목 없음';
  document.getElementById('npArtist').textContent = _hdr?.artist||_hdr?.creatorName||'—';
  const typeEl=document.getElementById('npType');
  typeEl.textContent=_isVideo?'🎬 TL4 영상':'🎵 TL3 오디오';
  typeEl.style.display='inline-block';

  // 비디오/오디오 영역 전환
  const va=document.getElementById('videoArea');
  const disc=document.getElementById('discEl');
  if(_isVideo){ va.classList.add('show'); disc.style.display='none'; }
  else { va.classList.remove('show'); disc.style.display='flex'; }

  updateFTL(); renderPL();

  if(_fileTL<=0){
    document.getElementById('rcBar').style.display='flex';
    setSt('⚡ 파일 TL 소진 — 재충전 후 재생하세요','warn');
    return;
  }
  document.getElementById('rcBar').style.display='none';
  await startPlay(t);
}

async function startPlay(t){
  document.getElementById('playBtn').textContent='⏳';

  // Blob URL 확인 (캐시 우선)
  let url=_blobCache.get(t.fp)||null;

  if(!url){
    // 복호화 대기
    if(t.decrypting){
      setSt('⏳ 복호화 준비 중...','warn');
      for(let i=0;i<300;i++){
        await new Promise(r=>setTimeout(r,100));
        if(_blobCache.has(t.fp)){url=_blobCache.get(t.fp);break;}
        if(!t.decrypting) break;
      }
    }
    // 직접 복호화
    if(!url){
      setSt('⏳ 복호화 중...','warn');
      const res=await tlAPI.decryptFile(t.fp);
      if(!res.decrypted){
        setSt('❌ 복호화 실패 — 파일을 다시 다운로드하세요','err');
        document.getElementById('playBtn').textContent='▶'; return;
      }
      t.decrypted=res.decrypted;
      const mime=t.hdr?.fileType||(_isVideo?'video/mp4':'audio/mpeg');
      const bytes=Uint8Array.from(atob(res.decrypted),c=>c.charCodeAt(0));
      url=URL.createObjectURL(new Blob([bytes],{type:mime}));
      _blobCache.set(t.fp,url);
    }
  }

  setSt('');
  try{
    if(_isVideo){
      _curEl=_video;
    } else {
      // 미리 로드된 Audio 있으면 사용
      const pre=_preCache.get(t.fp);
      _curEl = (pre&&pre.readyState>=2) ? pre : _audio;
      if(_curEl===_audio) _audio.src=url;
    }
    if(_isVideo) _video.src=url;

    _curEl.ontimeupdate=onTU;
    _curEl.onended=()=>nextTrack();
    _curEl.onerror=()=>{setSt('❌ 재생 오류','err');document.getElementById('playBtn').textContent='▶';};
    await _curEl.play();

    _playing=true;
    document.getElementById('playBtn').textContent='⏸';
    document.getElementById('playBtn').classList.add('on');
    if(!_isVideo){ document.getElementById('discEl').classList.add('spin'); document.getElementById('eqEl').classList.add('on'); }
    setSt('▶ 재생 중 · '+_tlPerSec+' TL/s','ok');
    startTick(); renderPL();
  }catch(e){
    setSt('❌ '+e.message,'err');
    document.getElementById('playBtn').textContent='▶';
  }
}

async function togglePlay(){
  if(!_fp){setSt('파일을 추가하세요','warn');return;}
  if(_playing){stopPB();return;}
  if(_fileTL<=0){document.getElementById('rcBar').style.display='flex';setSt('⚡ TL 소진 — 재충전하세요','err');return;}
  const t=_playlist[_curIdx];
  if(t) await startPlay(t);
}

function stopPB(clearSt=true){
  _playing=false;
  _audio.pause(); _audio.removeAttribute('src'); _audio.load();
  _video.pause(); _video.removeAttribute('src'); _video.load();
  if(_curEl&&_curEl!==_audio&&_curEl!==_video){ _curEl.pause(); _curEl.currentTime=0; }
  _curEl=_audio;
  document.getElementById('playBtn').textContent='▶';
  document.getElementById('playBtn').classList.remove('on');
  document.getElementById('discEl').classList.remove('spin');
  document.getElementById('eqEl').classList.remove('on');
  document.getElementById('progFill').style.width='0%';
  document.getElementById('timeEl').textContent='0:00';
  if(clearSt) setSt('');
  flushPoc(); stopTick(); renderPL();
}

function prevTrack(){ if(_curIdx>0) playTrack(_curIdx-1); }
function nextTrack(){ if(_curIdx<_playlist.length-1) playTrack(_curIdx+1); else stopPB(); }

function removeTrack(idx){
  const fp=_playlist[idx]?.fp;
  if(idx===_curIdx){stopPB();_curIdx=-1;_fp=null;}
  else if(idx<_curIdx) _curIdx--;
  _playlist.splice(idx,1);
  if(fp){ if(_blobCache.has(fp)){URL.revokeObjectURL(_blobCache.get(fp));_blobCache.delete(fp);} if(_preCache.has(fp)){const a=_preCache.get(fp);a.pause();a.src='';_preCache.delete(fp);} }
  renderPL();
  if(_playlist.length===0) resetUI();
}

// ── TL 차감 ──
function startTick(){
  stopTick();
  _tick=setInterval(async()=>{
    if(!_playing) return;
    _fileTL=Math.max(0,_fileTL-_tlPerSec);
    if(_fp) await tlAPI.updateTLBalance({filePath:_fp,newBalance:_fileTL});
    if(_playlist[_curIdx]) _playlist[_curIdx].tl_balance=_fileTL;
    updateFTL(); _poc+=_tlPerSec;
    if(_fileTL<=0){stopPB(false);document.getElementById('rcBar').style.display='flex';setSt('⚡ TL 소진 — 재충전 후 계속 재생하세요','err');}
    if(_poc>=10) flushPoc();
  },1000);
}
function stopTick(){if(_tick){clearInterval(_tick);_tick=null;}}
async function flushPoc(){
  if(_poc<=0||!_shareId||!_token) return;
  const s=_poc;_poc=0;
  try{await tlAPI.recordPOC({shareId:_shareId,token:_token,seconds:s,deduct_rate:_tlPerSec});}catch(e){}
}

// ── 재충전 ──
async function doRecharge(){
  const amount=_fileTLMax||3600;
  setSt('⏳ 재충전 중...');
  try{
    const res=await tlAPI.rechargeTL({filePath:_fp,shareId:_shareId||null,token:_token||null,amount});
    if(res.error) throw new Error(res.error);
    _fileTL=res.new_balance; _fileTLMax=Math.max(_fileTLMax||amount,_fileTL);
    if(_playlist[_curIdx]){_playlist[_curIdx].tl_balance=_fileTL;_playlist[_curIdx].tl_max=_fileTLMax;}
    updateFTL(); document.getElementById('rcBar').style.display='none';
    setSt(res.local_only?'✅ '+amount.toLocaleString()+' TL 충전 완료':'✅ '+amount.toLocaleString()+' TL 재충전 완료!','ok');
    renderPL(); syncMyTL();
    const t=_playlist[_curIdx]; if(t&&!_playing) await startPlay(t);
  }catch(e){setSt('❌ 재충전 실패: '+e.message,'err');}
}

// ── TL 표시 ──
function updateFTL(){
  const pct=_fileTLMax>0?Math.max(0,Math.min(100,(_fileTL/_fileTLMax)*100)):0;
  document.getElementById('ftlVal').textContent=Number(_fileTL).toLocaleString()+' TL';
  document.getElementById('ftlFill').style.width=pct+'%';
  document.getElementById('ftlRate').textContent=_tlPerSec+' TL/s';
  const rem=_tlPerSec>0?Math.floor(_fileTL/_tlPerSec):0;
  document.getElementById('ftlRemain').textContent='남은 재생: '+fmt(rem);
  const f=document.getElementById('ftlFill');
  if(pct<10)f.style.background='var(--rose)';
  else if(pct<30)f.style.background='linear-gradient(90deg,var(--rose),var(--gold))';
  else f.style.background='linear-gradient(90deg,var(--rose),var(--gold),var(--mint))';
}

// ── 진행바 ──
function onTU(){
  const dur=_curEl.duration||_hdr?.duration||1;
  const cur=_curEl.currentTime||0;
  document.getElementById('progFill').style.width=(cur/dur*100).toFixed(1)+'%';
  document.getElementById('timeEl').textContent=fmt(Math.floor(cur));
  document.getElementById('durEl').textContent=fmt(Math.floor(dur));
}
function seekTo(e){
  const bar=document.getElementById('progTrack');
  _curEl.currentTime=(e.offsetX/bar.offsetWidth)*(_curEl.duration||0);
}
function seekRel(s){_curEl.currentTime=Math.max(0,(_curEl.currentTime||0)+s);}

// ── 플레이리스트 렌더링 ──
function renderPL(){
  const empty=document.getElementById('plEmpty'),list=document.getElementById('plList');
  document.getElementById('plCnt').textContent=_playlist.length+'곡';
  if(_playlist.length===0){empty.style.display='flex';list.style.display='none';return;}
  empty.style.display='none';list.style.display='block';
  list.innerHTML=_playlist.map((t,i)=>{
    const cur=i===_curIdx,tl=Number(t.tl_balance||0);
    return `<div class="pl-item${cur?' cur':''}" onclick="playTrack(${i})">
      <div class="pl-num">${cur&&_playing?'▶':(i+1)}</div>
      <div class="pl-ico">${t.icon}</div>
      <div class="pl-inf">
        <div class="pl-name">${esc(t.hdr?.title||'제목 없음')}</div>
        <div class="pl-sub">${esc(t.hdr?.artist||t.hdr?.creatorName||'—')}${t.decrypting?' · ⏳':''}</div>
      </div>
      <div class="pl-tl">${tl>0
        ?`<div class="pl-tl-v">${Number(tl).toLocaleString()} TL</div>`
        :`<div class="pl-tl-e">TL 없음</div>`}</div>
      <button class="pl-del" onclick="event.stopPropagation();removeTrack(${i})">✕</button>
    </div>`;
  }).join('');
}

function resetUI(){
  document.getElementById('npTitle').textContent='재생 중인 파일 없음';
  document.getElementById('npArtist').textContent='.tl 파일을 추가하세요';
  document.getElementById('npType').style.display='none';
  document.getElementById('ftlVal').textContent='— TL';
  document.getElementById('ftlFill').style.width='0%';
  document.getElementById('ftlRemain').textContent='남은 재생: —';
  document.getElementById('ftlRate').textContent='— TL/s';
  document.getElementById('progFill').style.width='0%';
  document.getElementById('timeEl').textContent='0:00';
  document.getElementById('durEl').textContent='0:00';
  document.getElementById('videoArea').classList.remove('show');
  document.getElementById('discEl').style.display='flex';
}

// ── 드롭 ──
function onDrop(e){
  e.preventDefault();
  document.getElementById('dropOv').classList.remove('show');
  const fps=Array.from(e.dataTransfer.files)
    .filter(f=>/\.(tl|tl3|tl4|tlg|tld|tle)$/i.test(f.name)).map(f=>f.path);
  if(fps.length) addToPlaylist(fps, _curIdx===-1);
}

// ── 유틸 ──
function fmt(s){return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setSt(msg,type){const el=document.getElementById('pSt');if(!el)return;el.textContent=msg;el.className='p-st'+(type?' '+type:'');}
</script>
